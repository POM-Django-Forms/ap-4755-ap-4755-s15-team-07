{% extends 'authentication/base.html' %}

{% block content %}
<div class="auth-wrapper">

    <h2 class="auth-title">Реєстрація</h2>

    {% if error %}
        <p class="error-text">{{ error }}</p>
    {% endif %}

    <div class="auth-card">
        <form action="{% url 'register_user' %}" method="POST">
            {% csrf_token %}

            <label>Email:</label>
            <input type="email" name="email" class="form-input" required>

            <label>Пароль:</label>
            <input type="password" name="password" class="form-input" required>

            <label>Ім'я:</label>
            <input type="text" name="first_name" maxlength="20" class="form-input">

            <label>Прізвище:</label>
            <input type="text" name="last_name" maxlength="20" class="form-input">

            <label>По батькові:</label>
            <input type="text" name="middle_name" maxlength="20" class="form-input">

            <label><strong>Оберіть вашу роль:</strong></label><br>
            <div style="margin-top: 5px; margin-bottom: 20px;">
                <input type="radio" name="role" value="0" checked> Звичайний користувач (Visitor)<br>
                <input type="radio" name="role" value="1" style="margin-top: 8px;"> Бібліотекар (Admin)
            </div>

            <button type="submit" class="btn btn-primary btn-block">Зареєструватися</button>
        </form>
    </div>

    <p class="helper-text">Вже маєте акаунт? <a href="{% url 'login_user' %}">Увійти</a></p>

</div>
{% endblock %}
