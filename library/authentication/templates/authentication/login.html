{% extends 'authentication/base.html' %}

{% block content %}
<div class="auth-wrapper">

    <h2 class="auth-title">Вхід у систему</h2>

    {% if error %}
        <p class="error-text">{{ error }}</p>
    {% endif %}

    <div class="auth-card">
        <form action="{% url 'login_user' %}" method="POST">
            {% csrf_token %}

            <label>Email:</label>
            <input type="email" name="email" class="form-input" required>

            <label>Пароль:</label>
            <input type="password" name="password" class="form-input" required>

            <button type="submit" class="btn btn-success btn-block">Увійти</button>
        </form>
    </div>

    <p class="helper-text">Немає акаунту? <a href="{% url 'register_user' %}">Зареєструватися</a></p>

</div>
{% endblock %}
