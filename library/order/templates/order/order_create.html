{% extends 'authentication/base.html' %}
{% block content %}
    <h2 class="page-title">Бронювання: {{ book.name }}</h2>
    <div class="card form-wrapper">
        <form method="POST">
            {% csrf_token %}
            <label>Планова дата повернення:</label>
            <input type="date" name="plated_end_at" class="form-input" required>
            <button type="submit" class="btn btn-primary">Підтвердити</button>
            <a href="{% url 'book_list' %}" class="btn btn-secondary">Скасувати</a>
        </form>
    </div>
{% endblock %}
